<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">

    <title>CloSong Pro</title>
    
    <style>
        :root {
            --bg: #ffffff; --sidebar: #f8f9fa; --text: #1a1a1a;
            --accent: #3498db; --border: #ececec; --danger: #e74c3c;
        }
        .dark-mode {
            --bg: #121212; --sidebar: #1a1a1a; --text: #e0e0e0;
            --accent: #5dade2; --border: #333333;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg); color: var(--text); 
            margin: 0; display: flex; height: 100vh; overflow: hidden;
        }

        /* Sidebar */
        .sidebar { width: 300px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; flex-shrink: 0; }
        .logo-wrap { width: 100%; margin-bottom: 20px; text-align: center; }
        .logo-img { max-width: 100px; border-radius: 22%; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: 40vh; border-right: none; border-bottom: 1px solid var(--border); padding: 15px; }
            .logo-wrap { display: none; }
            .main { height: 60vh; }
        }

        /* Elements */
        .search-box { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg); color: var(--text); margin-bottom: 10px; outline: none; font-size: 16px; }
        .song-list { flex-grow: 1; overflow-y: auto; list-style: none; padding: 0; margin: 0; }
        .song-item { 
            padding: 12px; border-radius: 8px; cursor: pointer; font-size: 14px; 
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;
            background: var(--bg); border: 1px solid transparent;
        }
        .active-song { background: var(--accent) !important; color: #fff !important; }

        /* Main Content */
        .main { flex-grow: 1; display: flex; flex-direction: column; background: var(--bg); }
        .nav { padding: 10px 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        .editor-container { flex-grow: 1; padding: 20px; display: flex; flex-direction: column; max-width: 800px; margin: 0 auto; width: 100%; }
        
        #songTitle { font-size: 24px; font-weight: bold; border: none; background: transparent; color: var(--text); outline: none; margin-bottom: 10px; width: 100%; }
        #editor { flex-grow: 1; border: none; outline: none; background: transparent; font-size: 18px; line-height: 1.7; font-family: monospace; color: var(--text); resize: none; }

        .btn { padding: 10px 15px; border: 1px solid var(--border); background: var(--bg); color: var(--text); border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 12px; }
        .btn-accent { background: var(--accent); color: white; border: none; }
        .share-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo-wrap"><img src="icon.png" alt="Logo" class="logo-img"></div>
    <input type="text" id="searchInput" class="search-box" placeholder="ค้นหาเพลง..." oninput="renderList()">
    <ul id="songList" class="song-list"></ul>
    <button class="btn btn-accent" style="width:100%; margin-top:10px;" onclick="addSong()">+ เพิ่มเพลงใหม่</button>
    <div class="share-row">
        <button class="btn" onclick="exportData()">📤 ส่งออก</button>
        <button class="btn" onclick="importData()">📥 นำเข้า</button>
    </div>
</div>

<div class="main">
    <div class="nav">
        <div style="display:flex; gap:8px; align-items:center;">
            <button class="btn" onclick="toggleScroll()" id="scBtn">▶ เล่น</button>
            <input type="range" id="spd" min="0" max="10" value="0" style="width:60px;">
        </div>
        <button class="btn" onclick="document.body.classList.toggle('dark-mode')">🌓 โหมด</button>
    </div>
    <div class="editor-container">
        <input type="text" id="songTitle" placeholder="ชื่อเพลง..." oninput="save()">
        <textarea id="editor" placeholder="ใส่เนื้อเพลงและ [C]คอร์ด..." oninput="save()"></textarea>
    </div>
</div>

<script>
    let songs = JSON.parse(localStorage.getItem('clo_v11')) || [];
    let cur = null, timer = null;

    function renderList() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        const list = document.getElementById('songList');
        list.innerHTML = '';
        songs.forEach((s, i) => {
            if (s.title.toLowerCase().includes(q)) {
                const li = document.createElement('li');
                li.className = `song-item ${cur === i ? 'active-song' : ''}`;
                li.innerHTML = `<span style="flex:1" onclick="load(${i})">${s.title || 'ไม่มีชื่อ'}</span>
                                <span onclick="del(${i})">🗑️</span>`;
                list.appendChild(li);
            }
        });
    }

    function addSong() { songs.push({title:'เพลงใหม่', content:''}); load(songs.length-1); }
    function load(i) { cur = i; document.getElementById('songTitle').value = songs[i].title; document.getElementById('editor').value = songs[i].content; renderList(); }
    function save() { if(cur!==null){ songs[cur].title=document.getElementById('songTitle').value; songs[cur].content=document.getElementById('editor').value; localStorage.setItem('clo_v11', JSON.stringify(songs)); } }
    function del(i) { if(confirm('ลบ?')){ songs.splice(i,1); cur=null; save(); renderList(); } }

    function exportData() {
        const code = btoa(unescape(encodeURIComponent(JSON.stringify(songs))));
        navigator.clipboard.writeText(code); alert("คัดลอกรหัสแล้ว!");
    }
    function importData() {
        const code = prompt("วางรหัสเพลง:");
        if(code) { songs = [...songs, ...JSON.parse(decodeURIComponent(escape(atob(code))))]; save(); renderList(); }
    }

    function toggleScroll() {
        const btn = document.getElementById('scBtn');
        if(timer){ clearInterval(timer); timer=null; btn.innerText="▶ เล่น"; }
        else { 
            const s = document.getElementById('spd').value; if(s==0) return;
            timer = setInterval(()=>document.getElementById('editor').scrollTop += 1, 100/s);
            btn.innerText="⏸ หยุด";
        }
    }

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(()=>console.log("Offline Active"));
    }
    window.onload = () => { renderList(); if(songs.length>0) load(0); };
</script>
</body>
</html>
