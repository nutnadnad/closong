<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <title>CloSong Pro</title>
    <style>
        :root { --bg: #ffffff; --sidebar: #ffffff; --text: #1a1a1a; --accent: #3498db; --border: #edf2f7; --sub: #718096; }
        .dark-mode { --bg: #1a202c; --sidebar: #2d3748; --text: #f7fafc; --accent: #4299e1; --border: #4a5568; --sub: #a0aec0; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; transition: background 0.2s; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow: hidden; display: flex; }

        /* Side Drawer System */
        .drawer-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; display: none; }
        .sidebar { 
            position: fixed; top: 0; left: -320px; width: 320px; height: 100%; 
            background: var(--sidebar); z-index: 101; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; padding: 20px; box-shadow: 5px 0 15px rgba(0,0,0,0.1);
        }
        .sidebar.open { left: 0; }
        .drawer-overlay.open { display: block; }

        /* Main Content Area */
        .main { flex: 1; height: 100vh; display: flex; flex-direction: column; width: 100%; }
        
        /* Top Navigation */
        .nav { 
            height: 60px; padding: 0 15px; border-bottom: 1px solid var(--border); 
            display: flex; justify-content: space-between; align-items: center; background: var(--bg);
        }
        .menu-btn { 
            background: var(--accent); color: white; border: none; width: 42px; height: 42px; 
            border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px;
        }

        /* Editor Styles */
        .editor-wrapper { flex: 1; overflow-y: auto; padding: 15px; }
        .editor-container { max-width: 800px; margin: 0 auto; }
        #songTitle { font-size: 26px; font-weight: 800; border: none; background: transparent; color: var(--text); outline: none; width: 100%; }
        #songArtist { font-size: 14px; border: none; background: transparent; color: var(--accent); outline: none; width: 100%; margin-bottom: 15px; font-weight: 600; }
        #editor { 
            width: 100%; border: none; outline: none; background: transparent; 
            font-size: 18px; line-height: 1.8; font-family: 'Menlo', monospace; 
            color: var(--text); resize: none; min-height: 60vh;
        }

        /* Toolbar & Controls */
        .toolbar { background: var(--border); padding: 10px; border-radius: 15px; margin-bottom: 15px; opacity: 0.9; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
        .btn { 
            padding: 8px 12px; border: 1px solid var(--border); background: var(--bg); 
            color: var(--text); border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 700;
        }
        .btn-accent { background: var(--accent); color: white; border: none; }

        /* List Styles in Sidebar */
        .search-box { width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 12px; margin-bottom: 15px; outline: none; background: var(--bg); color: var(--text); }
        .list-container { flex: 1; overflow-y: auto; }
        .song-item { 
            padding: 12px; border-radius: 10px; margin-bottom: 6px; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border);
        }
        .song-item.active { background: var(--accent); color: white; border-color: var(--accent); }
        .section-tag { font-size: 11px; font-weight: 800; color: var(--sub); text-transform: uppercase; margin: 15px 0 8px; letter-spacing: 1px; }

        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #2d3748; color: white; padding: 10px 20px; border-radius: 30px; font-size: 12px; display: none; z-index: 200; }
    </style>
</head>
<body>

<div id="overlay" class="drawer-overlay" onclick="toggleMenu()"></div>
<div id="toast" class="toast"></div>

<div id="sidebar" class="sidebar">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <img src="icon.png" alt="Logo" style="width:40px; border-radius:10px;">
        <button class="btn" onclick="toggleMenu()">ปิด ✕</button>
    </div>

    <input type="text" id="searchInput" class="search-box" placeholder="ค้นหาชื่อเพลงหรือผู้แต่ง..." oninput="renderList()">
    
    <div class="section-tag">คลังเพลงของคุณ</div>
    <div class="list-container" id="songList"></div>
    
    <div class="section-tag">PLAYLIST (จัดเตรียมแชร์)</div>
    <div class="list-container" id="setList" style="max-height:150px;"></div>

    <button class="btn btn-accent" style="width:100%; padding:14px; margin-top:10px;" onclick="addSong()">+ สร้างเพลงใหม่</button>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-top:10px;">
        <button class="btn" onclick="exportSetlist()">📤 แชร์ลิสต์</button>
        <button class="btn" onclick="importData()">📥 รับรหัส</button>
    </div>
</div>

<div class="main">
    <div class="nav">
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
        <div style="display:flex; gap:6px; align-items:center;">
            <button class="btn" onclick="transpose(-1)">♭</button>
            <button class="btn" onclick="transpose(1)">♯</button>
            <button class="btn btn-accent" onclick="toggleScroll()" id="scBtn">▶ PLAY</button>
        </div>
        <button class="btn" style="border-radius:50%; width:40px; height:40px; padding:0" onclick="document.body.classList.toggle('dark-mode')">🌓</button>
    </div>

    <div class="editor-wrapper">
        <div class="editor-container">
            <input type="text" id="songTitle" placeholder="ระบุชื่อเพลง..." oninput="save()">
            <input type="text" id="songArtist" placeholder="ชื่อผู้แต่ง / ศิลปิน" oninput="save()">
            
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <select id="songKey" class="btn" style="flex:1" onchange="handleKeyChange(this.value)">
                    <option value="C">Key: C</option><option value="C#">Key: C#</option><option value="D">Key: D</option>
                    <option value="D#">Key: D#</option><option value="E">Key: E</option><option value="F">Key: F</option>
                    <option value="F#">Key: F#</option><option value="G">Key: G</option><option value="G#">Key: G#</option>
                    <option value="A">Key: A</option><option value="A#">Key: A#</option><option value="B">Key: B</option>
                </select>
                <input type="text" id="songTime" class="btn" placeholder="4/4" style="width:70px;" oninput="save()">
                <input type="number" id="songTempo" class="btn" placeholder="BPM" style="width:70px;" oninput="save()">
            </div>

            <div class="toolbar">
                <div class="btn-group">
                    <button class="btn" style="color:var(--accent)" onclick="insertChord('C')">C</button>
                    <button class="btn" style="color:var(--accent)" onclick="insertChord('D')">D</button>
                    <button class="btn" style="color:var(--accent)" onclick="insertChord('E')">E</button>
                    <button class="btn" style="color:var(--accent)" onclick="insertChord('F')">F</button>
                    <button class="btn" style="color:var(--accent)" onclick="insertChord('G')">G</button>
                    <button class="btn" style="color:var(--accent)" onclick="insertChord('A')">A</button>
                    <button class="btn" style="color:var(--accent)" onclick="insertChord('B')">B</button>
                </div>
                <div class="btn-group" style="margin-top:5px; border-top:1px solid var(--border); padding-top:8px;">
                    <button class="btn" onclick="modChord('m')">m</button>
                    <button class="btn" onclick="modChord('7')">7</button>
                    <button class="btn" onclick="modChord('maj7')">maj7</button>
                    <button class="btn" onclick="modChord('m7')">m7</button>
                    <button class="btn" onclick="modChord('9')">9</button>
                    <button class="btn" onclick="modChord('/')">/</button>
                    <button class="btn" style="color:var(--danger)" onclick="modChord('clear')">CLR</button>
                </div>
            </div>

            <textarea id="editor" placeholder="เริ่มเขียนเนื้อเพลงและใส่คอร์ดตรงนี้..." oninput="save()"></textarea>
        </div>
    </div>
</div>

<script>
    let songs = JSON.parse(localStorage.getItem('clo_v40')) || [];
    let setlist = JSON.parse(localStorage.getItem('set_v40')) || [];
    let cur = null, timer = null, lastKey = 'C';
    const keys = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('open');
    }

    function renderList() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        const list = document.getElementById('songList'); list.innerHTML = '';
        songs.forEach((s, i) => {
            if (s.title.toLowerCase().includes(q) || (s.artist && s.artist.toLowerCase().includes(q))) {
                const div = document.createElement('div');
                div.className = `song-item ${cur === i ? 'active' : ''}`;
                div.innerHTML = `<div style="flex:1" onclick="load(${i}); toggleMenu();">
                                    <b>${s.title || 'ไม่มีชื่อ'}</b><br><small>${s.artist || 'ไม่ระบุ'}</small>
                                 </div>
                                 <button class="btn" style="font-size:10px; margin-right:5px;" onclick="addToSet(${i}, event)">+SET</button>
                                 <span onclick="del(${i}, event)">🗑️</span>`;
                list.appendChild(div);
            }
        });
        renderSetlist();
    }

    function renderSetlist() {
        const list = document.getElementById('setList'); list.innerHTML = '';
        setlist.forEach((id, i) => {
            const s = songs.find(x => x.id === id);
            if(s) {
                const div = document.createElement('div'); div.className = 'song-item';
                div.innerHTML = `<span style="flex:1" onclick="loadById('${s.id}'); toggleMenu();">${i+1}. ${s.title}</span>
                                 <span onclick="remSet(${i})">×</span>`;
                list.appendChild(div);
            }
        });
    }

    function load(i) {
        cur = i; const s = songs[i];
        document.getElementById('songTitle').value = s.title;
        document.getElementById('songArtist').value = s.artist || '';
        document.getElementById('editor').value = s.content;
        document.getElementById('songKey').value = s.key || 'C';
        document.getElementById('songTime').value = s.time || '';
        document.getElementById('songTempo').value = s.bpm || '';
        lastKey = s.key || 'C';
        renderList();
    }

    function save() {
        if (cur === null) return;
        songs[cur] = {
            id: songs[cur].id || Date.now().toString(),
            title: document.getElementById('songTitle').value,
            artist: document.getElementById('songArtist').value,
            content: document.getElementById('editor').value,
            key: document.getElementById('songKey').value,
            time: document.getElementById('songTime').value,
            bpm: document.getElementById('songTempo').value
        };
        localStorage.setItem('clo_v40', JSON.stringify(songs));
        localStorage.setItem('set_v40', JSON.stringify(setlist));
    }

    function handleKeyChange(newKey) {
        const oldIdx = keys.indexOf(lastKey.replace('Db','C#').replace('Eb','D#').replace('Gb','F#').replace('Ab','G#').replace('Bb','A#'));
        const newIdx = keys.indexOf(newKey.replace('Db','C#').replace('Eb','D#').replace('Gb','F#').replace('Ab','G#').replace('Bb','A#'));
        transpose(newIdx - oldIdx);
        lastKey = newKey; save();
    }

    function transpose(n) {
        const ed = document.getElementById('editor');
        ed.value = ed.value.replace(/\[([A-G][#b]?)([^\]]*)\]/g, (m, r, t) => {
            let r_f = r.replace('Db','C#').replace('Eb','D#').replace('Gb','F#').replace('Ab','G#').replace('Bb','A#');
            let i = keys.indexOf(r_f);
            return (i === -1) ? m : `[${keys[(i + n + 12) % 12]}${t}]`;
        });
        save();
    }

    function insertChord(c) {
        const ed = document.getElementById('editor'); const s = ed.selectionStart;
        ed.value = ed.value.substring(0, s) + `[${c}]` + ed.value.substring(ed.selectionEnd);
        ed.selectionStart = ed.selectionEnd = s + c.length + 2; ed.focus(); save();
    }

    function modChord(m) {
        const ed = document.getElementById('editor'); const pos = ed.selectionStart;
        const match = ed.value.substring(0, pos).match(/\[([A-G][#b]?)([^\]]*)\](\s*)$/);
        if (match) {
            let newT = (m === 'clear') ? '' : (m === '/') ? match[2] + '/' : match[2] + m;
            ed.value = ed.value.substring(0, match.index) + `[${match[1]}${newT}]` + match[3] + ed.value.substring(pos);
            ed.selectionStart = ed.selectionEnd = pos + (newT.length - match[2].length);
        } ed.focus(); save();
    }

    function addSong() { songs.push({id: Date.now().toString(), title:'เพลงใหม่', content:'', key:'C'}); load(songs.length-1); toggleMenu(); }
    function addToSet(i, e) { e.stopPropagation(); if(!setlist.includes(songs[i].id)) setlist.push(songs[i].id); save(); renderSetlist(); showToast("เพิ่มเข้า Playlist"); }
    function remSet(i) { setlist.splice(i,1); save(); renderSetlist(); }
    function del(i, e) { e.stopPropagation(); if(confirm('ลบเพลงนี้?')){ songs.splice(i,1); cur=null; save(); renderList(); } }
    function exportSetlist() {
        const out = songs.filter(s => setlist.includes(s.id));
        if(!out.length) return alert("เลือกเพลงเข้า Playlist ก่อน");
        navigator.clipboard.writeText(btoa(unescape(encodeURIComponent(JSON.stringify(out)))));
        showToast("คัดลอกรหัส Playlist แล้ว!");
    }
    function importData() {
        const c = prompt("วางรหัส:");
        if(c) { try { songs = [...songs, ...JSON.parse(decodeURIComponent(escape(atob(c))))]; save(); renderList(); } catch(e){alert("ผิดพลาด");} }
    }
    function toggleScroll() {
        const btn = document.getElementById('scBtn');
        if(timer){ clearInterval(timer); timer=null; btn.innerText="▶ PLAY"; }
        else { 
            const s = document.getElementById('spd').value; if(s==0) return;
            timer = setInterval(()=> document.querySelector('.editor-wrapper').scrollTop += 1, 100/s);
            btn.innerText="⏸ STOP";
        }
    }
    function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2000); }
    function loadById(id) { const idx = songs.findIndex(s => s.id === id); if(idx !== -1) load(idx); }
    window.onload = () => { renderList(); if(songs.length > 0) load(0); };
</script>
</body>
</html>
